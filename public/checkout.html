<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Payment Gateway - Checkout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .checkout-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .card-header h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .card-body {
            padding: 40px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-error {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #991b1b;
        }
        .alert-success {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            color: #065f46;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="checkout-card">
        <div class="card-header">
            <h2>🛒 Secure Checkout</h2>
            <p>Pay with card, receive USDC on Polygon</p>
        </div>
        <div class="card-body">
            <div id="error-alert" class="alert alert-error"></div>
            <div id="success-alert" class="alert alert-success"></div>
            
            <form id="payment-form">
                <div class="form-group">
                    <label for="amount">Amount (USD)</label>
                    <input type="number" id="amount" name="amount" step="0.01" placeholder="Enter amount" required>
                </div>
                
                <div class="form-group">
                    <label for="currency">Currency</label>
                    <select id="currency" name="currency" required>
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="customerEmail">Email (optional)</label>
                    <input type="email" id="customerEmail" name="customerEmail" placeholder="your@email.com">
                </div>
                
                <button type="submit" class="btn" id="submit-btn">Continue to Payment</button>
            </form>
            
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Creating secure checkout session...</p>
            </div>
        </div>
    </div>
</div>

<script>
// Configuration
const API_BASE = '/.netlify/functions';

const form = document.getElementById('payment-form');
const submitBtn = document.getElementById('submit-btn');
const loadingDiv = document.getElementById('loading');
const errorAlert = document.getElementById('error-alert');
const successAlert = document.getElementById('success-alert');

function showLoading(show) {
    loadingDiv.style.display = show ? 'block' : 'none';
    submitBtn.disabled = show;
    form.style.display = show ? 'none' : 'block';
}

function showError(message) {
    errorAlert.textContent = message;
    errorAlert.style.display = 'block';
    setTimeout(() => {
        errorAlert.style.display = 'none';
    }, 5000);
}

function showSuccess(message) {
    successAlert.textContent = message;
    successAlert.style.display = 'block';
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const amount = document.getElementById('amount').value;
    const currency = document.getElementById('currency').value;
    const customerEmail = document.getElementById('customerEmail').value || 'customer@example.com';
    
    showLoading(true);
    
    try {
        const response = await fetch(`${API_BASE}/api/crossmint/payment`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                amount: parseFloat(amount),
                currency: currency,
                chain: 'polygon',
                customerEmail: customerEmail
            })
        });
        
        const result = await response.json();
        
        if (response.ok && result.success && result.checkoutUrl) {
            showSuccess('Redirecting to secure checkout...');
            setTimeout(() => {
                window.location.href = result.checkoutUrl;
            }, 1000);
        } else {
            showError(result.error || 'Failed to create checkout session');
            showLoading(false);
        }
    } catch (error) {
        console.error('Error:', error);
        showError('Network error. Please try again.');
        showLoading(false);
    }
});
</script>
</body>
</html>
